version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: oldkraken-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oldkraken-network

  redis:
    image: redis:7-alpine
    container_name: oldkraken-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - oldkraken-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oldkraken-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis
    networks:
      - oldkraken-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oldkraken-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - oldkraken-network

  nginx:
    image: nginx:alpine
    container_name: oldkraken-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - oldkraken-network

volumes:
  postgres_data:
  redis_data:

networks:
  oldkraken-network:
    driver: bridge
